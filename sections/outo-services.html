<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدماتنا - مركز صيانة السيارات</title>

    <!-- مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/outo-services.css">
</head>
<body>

    <div class="container">
        <!-- العنوان الرئيسي -->
        <div class="section-title-wrapper">
            <div class="section-title">خدماتنا</div>
        </div>

        <!-- شبكة الخدمات -->
        <div class="services-grid">

            <!-- كارت 1: كشف عام وفحص -->
            <div class="service-card">
                <h3>كشف عام وفحص</h3>
                <div class="card-image">
                    <!-- استبدل الرابط أدناه بصورة الفحص الحقيقية -->
                    <img src="../image/kf.png" alt="كشف عام وفحص">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-car-battery"></i>
                </div>
            </div>

            <!-- كارت 2: تربيط عفشه -->
            <div class="service-card">
                <h3>تربيط عفشه</h3>
                <div class="card-image">
                    <img src="../image/imag2.jpg" alt="تربيط عفشه">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-cogs"></i>
                </div>
            </div>

            <!-- كارت 3: ضبط زوايا -->
            <div class="service-card">
                <h3>ضبط زوايا</h3>
                <div class="card-image">
                    <img src="../image/angles.jpg" alt="ضبط زوايا">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-truck-monster"></i>
                </div>
            </div>

            <!-- كارت 4: ترصيص الإطارات -->
            <div class="service-card">
                <h3>ترصيص الإطارات</h3>
                <div class="card-image">
                    <img src="../image/t.jpg" alt="ترصيص الإطارات">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-dharmachakra"></i>
                </div>
            </div>

            <!-- كارت 5: بطاريات -->
            <div class="service-card">
                <h3>غسيل سيارات</h3>
                <div class="card-image">
                    <img src="../image/laundry.jpg" alt="غسيل سيارات">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-battery-full"></i>
                </div>
            </div>

            <!-- كارت 6: فلتر -->
            <div class="service-card">
                <h3>فلتر</h3>
                <div class="card-image">
                    <img src="../image/filter.jpg" alt="فلتر">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-filter"></i>
                </div>
            </div>

            <!-- كارت 7: زيت محرك -->
            <div class="service-card">
                <h3>غيار زيت</h3>
                <div class="card-image">
                    <img src="../image/oils.png" alt="زيت محرك">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-oil-can"></i>
                </div>
            </div>

            <!-- كارت 8: بيع وشراء غيار -->
            <div class="service-card">
                <h3>بيع وشراء غيار</h3>
                <div class="card-image">
                    <img src="../image/spare-parts.jpg" alt="بيع وشراء غيار">
                </div>
                <div class="card-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
