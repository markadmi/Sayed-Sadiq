<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب توظيف - القاهرة للإطارات والبطاريات</title>
    <!-- استدعاء خط جوجل للغة العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-color: #1a1a1a;
            --accent-color: #e51a1a; /* أحمر رياضي يناسب محلات السيارات */
            --bg-color: #f4f6f9;
            --text-color: #333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* شريط التنقل المبسط */
        header {
            background-color: var(--main-color);
            color: #fff;
            padding: 15px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* حاوية النموذج */
        .form-container {
            background: #fff;
            max-width: 550px;
            width: 90%;
            margin: 40px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--accent-color);
        }

        .form-container h2 {
            text-align: center;
            color: var(--main-color);
            margin-bottom: 25px;
            font-size: 1.6rem;
        }

        /* مجموعات الإدخال */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .form-group input[type="text"],
        .form-group input[type="tel"],
        .form-group input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* تنسيق اختيار الجنس */
        .gender-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .gender-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .gender-option input[type="radio"] {
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        /* زر الإرسال */
        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .btn-submit:hover {
            background-color: #c41414;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* التذييل */
        footer {
            margin-top: auto;
            background-color: var(--main-color);
            color: #ff7b00;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .filter-group label {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .filter-group select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .filter-group select:focus { border-color: var(--accent-gold); }
        .main{
            background-color: #555;
        }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي -->
    <header>
        <div class="logo">القاهرة للإطارات والبطاريات</div>
    </header>

    <!-- حاوية طلب التوظيف -->
    <main style="flex: 1;" class="main">
        <div class="form-container">
            <h2>إستمارة طلب توظيف</h2>
            
            <form id="jobApplicationForm" onsubmit="handleFormSubmit(event)">
                
                <!-- الاسم بالكامل -->
                <div class="form-group">
                    <label for="fullName">الاسم بالكامل:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="أدخل اسمك ثلاثي أو رباعي" required minlength="10">
                </div>

                <!-- العنوان -->
                <div class="form-group">
                    <label for="address">العنوان الحالي:</label>
                    <input type="text" id="address" name="address" placeholder="المحافظة، المدينة، اسم الشارع" required>
                </div>

                <div class="filter-group">
                    <label for="address">الوظائف المتاحة:</label>
                    <select id="sizeFilter" onchange="">
                        <option value="all">اختر الوظيفة</option>
                        <option value="0">صنايعي كوتش</option>
                        <option value="1">كهربائي سيارات</option>
                        <option value="2">محاسبه و اداره مايه</option>
                        <option value="3">كشف زوايات</option>
                        <option value="4">سائق شاحنة</option>
                        <option value="5">صنايعي غيار زيت</option>
                    </select>
                </div>

                <!-- رقم التليفون -->
                <div class="form-group">
                    <label for="phone">رقم الهاتف (الواتساب إن وجد):</label>
                    <!-- النمط للتأكد من أنه رقم موبايل مصري يبدأ بـ 01 ويحتوي على 11 رقم -->
                    <input type="tel" id="phone" name="phone" placeholder="01xxxxxxxx" pattern="^01[0125][0-9]{8}$" title="يرجى إدخال رقم موبايل مصري صحيح مكون من 11 رقم" required>
                </div>

                <!-- تاريخ الميلاد -->
                <div class="form-group">
                    <label for="birthDate">تاريخ الميلاد:</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                </div>

                <!-- تحديد الجنس -->
                <div class="form-group">
                    <label>الجنس:</label>
                    <div class="gender-group">
                        <label class="gender-option">
                            <input type="radio" name="gender" value="ذكر" required>
                            <span>ذكر</span>
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="أنثى" required>
                            <span>أنثى</span>
                        </label>
                    </div>
                </div>

                <!-- زر الإرسال -->
                <button type="submit" class="btn-submit">إرسال الطلب الآن</button>

            </form>
        </div>
    </main>

    <!-- التذييل -->
    <footer>
        <p>&copy; 2026 القاهرة لتجارة الإطارات والبطاريات. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault(); // منع الصفحة من إعادة التحميل الافتراضية
            
            // جمع البيانات المدخلة
            const fullName = document.getElementById('fullName').value;
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const birthDate = document.getElementById('birthDate').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;

            // يمكنك هنا ربط البيانات بقاعدة بيانات أو إرسالها لـ API
            // حالياً سنعرض رسالة نجاح توضيحية للمستخدم
            alert(`شكراً لك يا ${fullName}، تم استلام طلب التوظيف الخاص بك بنجاح وجاري مراجعته!`);
            
            // إعادة تعيين الحقول بعد الإرسال
            document.getElementById('jobApplicationForm').reset();
        }
    </script>

</body>
</html>
