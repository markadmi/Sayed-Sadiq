<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب توظيف - القاهرة للإطارات والبطاريات</title>
    <!-- استدعاء خط جوجل للغة العربية (Cairo) بأوزان مختلفة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-color: #0f172a;    /* أسود ملكي مائل للكحلي يعطي انطباعاً رسمياً واحترافياً */
            --accent-color: #dc2626;  /* أحمر رياضي قوي وجذاب يناسب مجالات السيارات */
            --bg-color: #f8fafc;      /* خلفية فاتحة ومريحة جداً للعين */
            --input-bg: #ffffff;
            --text-color: #334155;    /* لون نصوص داكن ومريح للقراءة */
            --border-color: #cbd5e1;  /* لون رمادي خفيف للحدود */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* شريط التنقل العلوي الاحترافي */
        header {
            background-color: var(--main-color);
            color: #fff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        /* الحاوية الرئيسية للنموذج */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background: #ffffff;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border-top: 6px solid var(--accent-color);
        }

        .form-container h2 {
            text-align: center;
            color: var(--main-color);
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* مجموعات الإدخال الموحدة */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--main-color);
            font-size: 0.95rem;
        }

        /* تنسيق موحد لكل حقول الإدخال والقوائم المنسدلة */
        .form-group input[type="text"],
        .form-group input[type="tel"],
        .form-group input[type="date"],
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: var(--text-color);
            background-color: var(--input-bg);
            outline: none;
            transition: all 0.25s ease-in-out;
            appearance: none; /* إلغاء المظهر الافتراضي للمتصفح لتعديله */
        }

        /* إضافة سهم مخصص للقائمة المنسدلة يناسب التصميم الـ RTL */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            font-size: 0.8rem;
            color: #64748b;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* تأثير الحركة الجذاب عند الضغط على الحقول */
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        /* تنسيق اختيار الجنس (أزرار الراديو) */
        .gender-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .gender-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            user-select: none;
        }

        .gender-option input[type="radio"] {
            accent-color: var(--accent-color);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* زر الإرسال العصري */
        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.2);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #b91c1c;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* التذييل المتناسق */
        footer {
            background-color: var(--main-color);
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            border-top: 1px solid #1e293b;
        }

        footer p span {
            color: #f1f5f9;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي -->
    <header>
        <div class="logo">القاهرة للإطارات والبطاريات</div>
    </header>

    <!-- الحاوية الرئيسية للطلب -->
    <main>
        <div class="form-container">
            <h2>إستمارة طلب توظيف</h2>
            
            <form id="jobApplicationForm" onsubmit="handleFormSubmit(event)">
                
                <!-- الاسم بالكامل -->
                <div class="form-group">
                    <label for="fullName">الاسم بالكامل:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="أدخل اسمك ثلاثي أو رباعي" required minlength="10">
                </div>

                <!-- العنوان -->
                <div class="form-group">
                    <label for="address">العنوان الحالي:</label>
                    <input type="text" id="address" name="address" placeholder="المحافظة، المدينة، اسم الشارع" required>
                </div>

                <!-- الوظائف المتاحة -->
                <div class="form-group">
                    <label for="jobFilter">الوظيفة المراد التقديم عليها:</label>
                    <div class="select-wrapper">
                        <select id="jobFilter" name="jobPosition" required>
                            <option value="" disabled selected hidden>اختر الوظيفة المناسبة لك</option>
                            <option value="صنايعي كوتش">صنايعي كوتش</option>
                            <option value="كهربائي سيارات">كهربائي سيارات</option>
                            <option value="محاسبة وإدارة مالية">محاسبة وإدارة مالية</option>
                            <option value="ضبط زوايا وإتزان">ضبط زوايا وإتزان</option>
                            <option value="سائق شاحنة">سائق شاحنة</option>
                            <option value="صنايعي غيار زيت">صنايعي غيار زيت</option>
                        </select>
                    </div>
                </div>

                <!-- رقم التليفون -->
                <div class="form-group">
                    <label for="phone">رقم الهاتف (الواتساب إن وجد):</label>
                    <input type="tel" id="phone" name="phone" placeholder="01xxxxxxxx" pattern="^01[0125][0-9]{8}$" title="يرجى إدخال رقم موبايل مصري صحيح مكون من 11 رقم" required>
                </div>

                <!-- تاريخ الميلاد -->
                <div class="form-group">
                    <label for="birthDate">تاريخ الميلاد:</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                </div>

                <!-- تحديد الجنس -->
                <div class="form-group">
                    <label>الجنس:</label>
                    <div class="gender-group">
                        <label class="gender-option">
                            <input type="radio" name="gender" value="ذكر" required>
                            <span>ذكر</span>
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="أنثى" required>
                            <span>أنثى</span>
                        </label>
                    </div>
                </div>

                <!-- زر الإرسال -->
                <button type="submit" class="btn-submit">إرسال الطلب الآن</button>

            </form>
        </div>
    </main>

    <!-- التذييل -->
    <footer>
        <p>&copy; 2026 <span>القاهرة لتجارة الإطارات والبطاريات</span>. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault(); // منع الصفحة من إعادة التحميل الافتراضية
            
            // جمع البيانات المدخلة
            const fullName = document.getElementById('fullName').value;
            const jobSelect = document.getElementById('jobFilter');
            const selectedJob = jobSelect.options[jobSelect.selectedIndex].text;

            // عرض رسالة نجاح مخصصة واحترافية بناءً على الوظيفة المحددة
            alert(`شكراً لك يا أستاذ/ة ${fullName}، تم استلام طلبك لوظيفة (${selectedJob}) بنجاح وجاري مراجعته من قبل إدارة الموارد البشرية!`);
            
            // إعادة تعيين الحقول بعد الإرسال
            document.getElementById('jobApplicationForm').reset();
        }
    </script>

</body>
</html>
