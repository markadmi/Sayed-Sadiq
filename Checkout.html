<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام الطلب والدفع - القاهرة للإطارات والبطاريات</title>
    <!-- استدعاء خط جوجل للغة العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/Checkout.css">
</head>
<body>

    <header>
        <div style="color: var(--accent-gold); font-weight: 900; font-size: 1.2rem;">القاهرة للإطارات والبطاريات</div>
        <a href="cart.html" class="back-btn">&rarr; العودة للسلة</a>
    </header>

    <div class="checkout-container">        
        <!-- ملخص الطلب الديناميكي المربوط بالسلة -->
        <div class="order-summary">
            <h3 style="margin-bottom: 15px; color: var(--text-muted);">ملخص الطلب</h3>
            
            <!-- حاوية ستظهر بداخلها المنتجات تلقائياً -->
            <div id="checkout-items-list"></div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #333;">
                <span>المجموع الفرعي</span>
                <span id="checkout-subtotal">0 ج.م</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>رسوم الشحن</span>
                <span id="checkout-shipping">200 ج.م</span>
            </div>
            <div class="order-total">
                <span>الإجمالي:</span>
                <span id="checkout-total">0 ج.م</span>
            </div>
        </div>

        <form onsubmit="submitOrder(event)">
            
            <!-- بيانات الشحن -->
            <h2 class="section-title">بيانات الاستلام</h2>
            
            <div class="form-group">
                <label>الاسم بالكامل</label>
                <input type="text" class="form-control" placeholder="اكتب اسمك الثلاثي" required>
            </div>
            
            <div class="flex-row">
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" class="form-control" placeholder="01xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>المدينة / المنطقة</label>
                    <input type="text" class="form-control" placeholder="مثال: مدينة نصر، القاهرة" required>
                </div>
            </div>

            <div class="form-group">
                <label>العنوان بالتفصيل</label>
                <input type="text" class="form-control" placeholder="اسم الشارع، رقم العمارة، الطابق" required>
            </div>

            <!-- طرق الدفع -->
            <h2 class="section-title" style="margin-top: 40px;">طريقة الدفع</h2>
            
            <div class="payment-methods">
                <label class="payment-method-card" id="card-cod" onclick="selectPayment('cod')">
                    <input type="radio" name="payment" value="cod" required>
                    <h3>💵 الدفع عند الاستلام</h3>
                </label>

                <label class="payment-method-card" id="card-vodafone" onclick="selectPayment('vodafone')">
                    <input type="radio" name="payment" value="vodafone">
                    <h3>📱 فودافون كاش</h3>
                </label>

                <label class="payment-method-card" id="card-visa" onclick="selectPayment('visa')">
                    <input type="radio" name="payment" value="visa">
                    <h3>💳 بطاقة بنكية (فيزا)</h3>
                </label>
            </div>

            <!-- رسالة الدفع عند الاستلام -->
            <div id="details-cod" class="payment-details">
                <p style="color: #4CAF50; font-weight: bold; text-align: center;">سيتم الدفع نقداً لمندوب التوصيل عند استلام المنتجات وفحصها.</p>
            </div>

            <!-- تفاصيل فودافون كاش -->
            <div id="details-vodafone" class="payment-details">
                <p style="margin-bottom: 15px; text-align: center;">برجاء تحويل المبلغ على الرقم التالي: <strong style="color: var(--accent-gold); font-size: 1.2rem;">01012345678</strong></p>
                <div class="form-group">
                    <label>رقم المحفظة الذي قمت بالتحويل منه (للتأكيد)</label>
                    <input type="tel" class="form-control" id="vodafone-number" placeholder="اكتب رقم فودافون كاش الخاص بك">
                </div>
            </div>

            <!-- تفاصيل الفيزا -->
            <div id="details-visa" class="payment-details">
                <div class="form-group">
                    <label>اسم صاحب البطاقة</label>
                    <input type="text" class="form-control" id="card-name" placeholder="كما هو مكتوب على البطاقة">
                </div>
                <div class="form-group">
                    <label>رقم البطاقة</label>
                    <input type="text" class="form-control" id="card-number" placeholder="xxxx xxxx xxxx xxxx" maxlength="16">
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>تاريخ الانتهاء</label>
                        <input type="text" class="form-control" id="card-expiry" placeholder="MM/YY">
                    </div>
                    <div class="form-group">
                        <label>رمز الأمان (CVV)</label>
                        <input type="text" class="form-control" id="card-cvv" placeholder="3 أرقام خلف البطاقة" maxlength="3">
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">تأكيد الطلب</button>

        </form>

    </div>

    <script type="module">
    // 1. استدعاء مكتبات فايربيز وإعدادات الاتصال المسبقة
    import { db } from './firebase-init.js';
    import { ref, push, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // 2. اعتراض دالة submitOrder الأصلية وتحديثها لترسل لـ Firebase
    window.submitOrder = async function(event) {
        event.preventDefault(); // منع الصفحة من إعادة التحميل

        // جلب طريقة الدفع المختارة
        const paymentRadio = document.querySelector('input[name="payment"]:checked');
        if (!paymentRadio) {
            alert("يرجى اختيار طريقة الدفع أولاً.");
            return;
        }
        const paymentMethod = paymentRadio.value;

        // جلب حقول الإدخال الأساسية بالترتيب (الاسم، الهاتف، المدينة، العنوان)
        const formElements = event.target.elements;
        
        // تجميع كل البيانات المطلوبة للأوردر
        const orderData = {
            customerName: formElements[0].value,   // الاسم بالكامل
            customerPhone: formElements[1].value,  // رقم الهاتف
            customerCity: formElements[2].value,   // المدينة / المنطقة
            customerAddress: formElements[3].value, // العنوان بالتفصيل
            paymentMethod: paymentMethod,
            cartItems: JSON.parse(localStorage.getItem('cairo_cart')) || [], // المنتجات
            totalPrice: document.getElementById('checkout-total').innerText, // الإجمالي النهائي
            orderDate: new Date().toLocaleString('ar-EG') // وقت وتاريخ الطلب
        };

        // إضافة حقول الدفع الإضافية الذكية بناءً على طريقة الدفع
        if (paymentMethod === 'vodafone') {
            const vNode = document.getElementById('vodafone-number');
            orderData.vodafoneNumber = vNode ? vNode.value : '';
        } else if (paymentMethod === 'visa') {
            orderData.visaDetails = {
                cardHolder: document.getElementById('card-name')?.value || '',
                cardNumber: document.getElementById('card-number')?.value || '',
                expiry: document.getElementById('card-expiry')?.value || '',
                cvv: document.getElementById('card-cvv')?.value || ''
            };
        }

        // تغيير نص زر التأكيد مؤقتاً لحين انتهاء الرفع لمنع الضغط المتكرر
        const submitBtn = event.target.querySelector('.submit-btn');
        const originalText = submitBtn ? submitBtn.innerText : "تأكيد الطلب";
        if (submitBtn) {
            submitBtn.innerText = "جاري إرسال طلبك للسيستم...";
            submitBtn.disabled = true;
        }

        try {
            // إرسال البيانات فوراً لـ Firebase تحت قسم "orders"
            const ordersRef = ref(db, 'orders');
            const newOrderRef = push(ordersRef);
            await set(newOrderRef, orderData);

            // رسالة النجاح للمستخدم بعد تمام الرفع
            alert("شكراً لتجربتك موقعنا 🤍😊\nتم استلام طلبك بنجاح وحفظه في النظام.");

            // تنظيف السلة والتوجيه كما كنت تفعل بكودك القديم
            localStorage.removeItem('cairo_cart');
            window.location.href = "index.html";

        } catch (error) {
            console.error("خطأ أثناء إرسال الطلب إلى Firebase:", error);
            alert("حدث خطأ غير متوقع أثناء إرسال الطلب، يرجى المحاولة مرة أخرى.");
            
            // إعادة الزر لوضعه الطبيعي في حال فشل الاتصال بالإنترنت
            if (submitBtn) {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        }
    };
    </script>
        <!--نهاية كود ربط البيانات-->
    <script>
        // -----------------------------------------------------------------
        // 1. دالة جلب بيانات السلة وحساب الإجمالي (تعمل تلقائياً عند فتح الصفحة)
        // -----------------------------------------------------------------
        function loadCheckoutSummary() {
            // جلب السلة من الذاكرة
            let cart = JSON.parse(localStorage.getItem('cairo_cart')) || [];
            
            // إذا وصل المستخدم لهذه الصفحة والسلة فارغة، نعيده لصفحة السلة
            if (cart.length === 0) {
                alert("سلة المشتريات فارغة، لا يمكنك إتمام الطلب.");
                window.location.href = "cart.html"; 
                return;
            }

            let subtotal = 0;
            const itemsListContainer = document.getElementById('checkout-items-list');
            itemsListContainer.innerHTML = ''; // تفريغ القائمة أولاً

            // المرور على المنتجات وعرضها وحساب الإجمالي
            cart.forEach(item => {
                const price = parseFloat(item.price) || 0;
                const qty = parseInt(item.qty) || 1;
                const itemTotal = price * qty;
                
                subtotal += itemTotal;

                // إضافة اسم المنتج، كميته، وسعره للقائمة
                itemsListContainer.insertAdjacentHTML('beforeend', `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #ddd; font-size: 0.95rem;">
                        <span>${item.name} (الكمية: ${qty})</span>
                        <span>${Number(itemTotal).toLocaleString('en-US')} ج.م</span>
                    </div>
                `);
            });

            // حساب الإجمالي النهائي
            const shipping = 200; // مصاريف الشحن
            const grandTotal = subtotal + shipping;

            // طباعة الأرقام في الواجهة
            document.getElementById('checkout-subtotal').innerText = Number(subtotal).toLocaleString('en-US') + ' ج.م';
            document.getElementById('checkout-shipping').innerText = Number(shipping).toLocaleString('en-US') + ' ج.م';
            document.getElementById('checkout-total').innerText = Number(grandTotal).toLocaleString('en-US') + ' ج.م';
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.onload = loadCheckoutSummary;

        // -----------------------------------------------------------------
        // 2. دوال التحكم في وسائل الدفع
        // -----------------------------------------------------------------
        function selectPayment(method) {
            document.querySelectorAll('.payment-method-card').forEach(card => {
                card.classList.remove('active');
            });

            document.querySelectorAll('.payment-details').forEach(detail => {
                detail.style.display = 'none';
            });

            document.getElementById('card-' + method).classList.add('active');
            document.getElementById('details-' + method).style.display = 'block';
            document.querySelector(`input[value="${method}"]`).checked = true;
            toggleRequiredFields(method);
        }

        function toggleRequiredFields(method) {
            document.getElementById('vodafone-number').required = false;
            document.getElementById('card-name').required = false;
            document.getElementById('card-number').required = false;
            document.getElementById('card-expiry').required = false;
            document.getElementById('card-cvv').required = false;

            if(method === 'vodafone') {
                document.getElementById('vodafone-number').required = true;
            } else if (method === 'visa') {
                document.getElementById('card-name').required = true;
                document.getElementById('card-number').required = true;
                document.getElementById('card-expiry').required = true;
                document.getElementById('card-cvv').required = true;
            }
        }

        // -----------------------------------------------------------------
        // 3. دالة إرسال الطلب وتنظيف السلة
        // -----------------------------------------------------------------
        function submitOrder(event) {
            event.preventDefault(); 
            
            // رسالة النجاح
            alert("شكراً لتجربتك موقعنا 🤍😊\nتم استلام طلبك بنجاح.");
            
            // 1. مسح السلة لأن الطلب تم إتمامه
            localStorage.removeItem('cairo_cart');
            
            // 2. إعادة توجيه المستخدم للصفحة الرئيسية
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
